
{% extends "base.html" %}
{% load static %}
<title>Курсы</title>
{% block css %}
<link rel="stylesheet" href="{% static "styles/base.css" %}">
<link rel="stylesheet" href="{% static "styles/Cards.css" %}">
<link rel="stylesheet" href="{% static "styles/Content.css" %}">
{% endblock css %}
   

{% block cards_of_lessons %}
  {% for course in courses %}               
    <div class="p_pr">
      <p>{{ course.name }}</p>

    </div>

    <div class="img_al2">
      <img src="{% static "img/man.png" %}" alt="Group image" width="70%">
    </div>
  {% empty %}
    <p>Нет доступных групп.</p>           
  {% endfor %}
{% endblock cards_of_lessons %}
