{% extends "base.html" %}
{% load static %}
 {% block css %} 
    <title>Обращения пользователей</title>
    <link rel="stylesheet" href="{% static "styles/base.css" %}">
    <link rel="stylesheet" href="{% static "styles/Log_in.css" %}">
    <link rel="stylesheet" href="{% static "styles/Content.css" %}">
    <link rel="stylesheet" href="{% static "styles/Cards.css" %}">
{% endblock css %}



<!-- Форма обратной связи -->
{% block connect %}
 <div class="container_sv">
    <div class="content">
        <div class="left-side">
            <div class="addres details">
                <i class="fas fa-map-marker-alt"></i>
                <div class="topic">Адрес</div>
                <div class="text-one">г. Москва</div>
                <div class="text-two">Цветной бульвар ул., 8 д.</div>
            </div>
          <div class="phone details">
                <i class="fas fa-phone-alt"></i>

                <div class="text-one">+7 965 120 22 46</div>
            <div class="email details"></div>
                <i class="fas fa-envelope"></i>

                <div class="text-one">Online.school@yandex.ru</div>

          
        </div>
       
          <div class="right-side">
                <div class="topic-text">Задайте нам вопрос</div>
                <form action="{% url "feedback:feedback" %}" method="post">
                    {% csrf_token %}
                    <div class="input-box">
                        <input  name="name" id="exampleInputEmail1" aria-describedby="emailHelp" class="form-control" placeholder="Фамилия Имя Отчетсво" required>
                    </div>
                 
                    <div class="input-box">
                        <input type="text" name="email" class="form-control" id="exampleInputPassword1" placeholder="Email">
                    </div>
                   
                    </div>
                    <div class="input-box">
                       <input type="text" name="descriprion" class="form-control" id="exampleInputPassword1" placeholder="Текст сообщения" required>
                     
                    </div>
                    <div class="log_and_reg">
                    <div class="button">
                        <button type='submit' class='btn btn-dark'>Отправить</button>
                    </div>
                    </div>
                </form>
                </div>
            </div>
    
    </div>
        
    <script src="https://kit.fontawesome.com/04e6d630bb.js" crossorigin="anonymous"></script>
    <script src="app.js"></script>
    </div>

</div>
  
</div>  


<div class="img_al2">
<img src="{% static "img/man.png" %}" alt="" srcset="" width="70%">
</div>
{% endblock connect %}
